name: Android CI

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Debug Keystore
      run: |
        mkdir -p /home/runner/.android
        keytool -genkey -v -keystore /home/runner/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
        echo "Debug keystore generated successfully at /home/runner/.android/debug.keystore"
        ls -la /home/runner/.android/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: |
        ./gradlew clean :server:copyServer :app:assembleScrcpyRelease --no-build-cache --rerun-tasks
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: ScrcpyForAndroid-signed-release
        path: |
          app/build/outputs/apk/scrcpy/release/*.apk
        retention-days: 90  # Sets the artifact retention period to 90 days.
